# Tribe-chat-ui full stack — Chat UI + MongoDB + dynamic agent desktops
# 
# Usage:
#   docker compose up --build
#   Chat UI:  http://localhost:3000
#   MongoDB:  mongodb://localhost:27017
#
# Agent containers are spawned dynamically by the Chat UI server.
# Each user gets: tribe-agent-${userId} on the shared `tribe` network.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tribe

  chat-ui:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount Docker socket so Chat UI can spawn agent containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - MONGODB_URL=mongodb://mongo:27017/chat-ui
      - MONGODB_DB_NAME=chat-ui
      - AGENT_IMAGE=mdcnick/docker-webtop-tribe:agent
      - AGENT_NETWORK=tribe
      - PORT=3000
      - HOST=0.0.0.0
      # Add your other env vars here (OpenAI keys, Clerk, etc.)
    depends_on:
      - mongo
    networks:
      - tribe

networks:
  tribe:
    driver: bridge

volumes:
  mongo-data:
